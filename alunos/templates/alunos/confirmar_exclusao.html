{% extends "base.html" %}

{% block page_title %}Excluir Aluno | Portal Universitário{% endblock %}
{% block eyebrow %}Cadastro{% endblock %}
{% block title %}Excluir Aluno{% endblock %}

{% block content %}
<div class="content-stack">
    <section class="confirm-panel">
        <p>
            Tem certeza que deseja excluir
            <span class="confirm-name">{{ aluno.nome }}</span>?
        </p>

        <form method="POST">
            {% csrf_token %}
            <div class="confirm-actions">
                <button type="submit">Confirmar Exclusão</button>
                <a class="button" href="/alunos/">Cancelar</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
